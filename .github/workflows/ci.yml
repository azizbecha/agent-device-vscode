name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - run: npm run compile

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: agent-device-vscode-vsix
          path: '*.vsix'
          if-no-files-found: error
